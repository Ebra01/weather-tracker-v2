openapi: 3.0.3
info:
  title: Weather API
  version: 1.0.0
servers:
  - url: http://localhost:8080
paths:
  /weather:
    get:
      parameters:
        - in: query
          name: lat
          schema:
            type: number
            format: double
          required: true
          description: Numeric value of Latitude
          example: 10.542
        - in: query
          name: lon
          schema:
            type: number
            format: double
          required: true
          description: Numeric value of Longitude
          example: -12.0
      summary: Get weather information given Latitude and Logitude
      operationId: getWeather
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeatherResponse'
        '400':
          description: Invalid latitude or longitude
        '500':
          description: Internal server error
components:
  schemas:
    WeatherResponse:
      type: object
      properties:
        temperature:
          type: number
          format: double
        humidity:
          type: number
          format: double
        elevation:
          type: number
          format: double